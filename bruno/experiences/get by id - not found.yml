info:
  name: get by id - not found
  type: http
  seq: 8

http:
  method: GET
  url: "{{BASE_URL}}/experiences/{{experienceId}}"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("a deleted/unknown experience id currently surfaces as 500", function () {
          expect(res.getStatus()).to.equal(500);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  ExperienceService throws NoSuchElementException when an experience is missing, but
  there is no @RestControllerAdvice mapping it to 404, so it currently bubbles up as a
  500 Internal Server Error.
