info:
  name: login - invalid credentials
  type: http
  seq: 5

http:
  method: POST
  url: "{{BASE_URL}}/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "rizky.tester@example.com",
        "password": "WrongPassword!"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("a wrong password currently surfaces as 500", function () {
          expect(res.getStatus()).to.equal(500);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  AuthService.login calls AuthenticationManager.authenticate directly instead of
  going through Spring Security's filter chain, so the resulting
  BadCredentialsException is never translated into a 401 — it bubbles up as an
  unhandled 500 Internal Server Error.

  Depends on `register` having run first in this run/session to create the account.
