info:
  name: register - password mismatch
  type: http
  seq: 2

http:
  method: POST
  url: "{{BASE_URL}}/auth/register"
  body:
    type: json
    data: |-
      {
        "email": "mismatch.tester@example.com",
        "password": "SuperSecret123!",
        "confirmPassword": "DoesNotMatch!",
        "nickname": "Mismatch"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("a mismatched confirmPassword currently surfaces as 500", function () {
          expect(res.getStatus()).to.equal(500);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  AuthController.register is not annotated with @Valid and there is no
  @RestControllerAdvice, so AuthService's IllegalArgumentException("Password and
  Confirm Password do not match") bubbles up as a 500 Internal Server Error
  instead of a 400.
