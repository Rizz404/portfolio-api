info:
  name: get all - filtered
  type: http
  seq: 3

http:
  method: GET
  url: "{{BASE_URL}}/uses"
  params:
    - name: search
      value: Visual
      type: query
      disabled: false
    - name: category
      value: software
      type: query
      disabled: false
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("results should only contain matching, software category items", function () {
          const body = res.getBody();
          expect(body.content).to.be.an("array");
          body.content.forEach((use) => {
            expect(use.category).to.equal("software");
          });
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
