info:
  name: get by id
  type: http
  seq: 5

http:
  method: GET
  url: "{{BASE_URL}}/blog-attachments/{{blogAttachmentId}}"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("response body should match the created attachment", function () {
          const body = res.getBody();
          expect(body.id).to.equal(bru.getVar("blogAttachmentId"));
          expect(body.blogId).to.equal(bru.getVar("attachmentParentBlogId"));
          expect(body.fileName).to.equal("architecture-diagram.png");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Depends on `setup - create parent blog` and `create` having run first so
  `attachmentParentBlogId` / `blogAttachmentId` are set.
