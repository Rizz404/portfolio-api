info:
  name: get by id
  type: http
  seq: 5

http:
  method: GET
  url: "{{BASE_URL}}/blogs/{{blogId}}"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("response body should match the created blog", function () {
          const body = res.getBody();
          expect(body.id).to.equal(bru.getVar("blogId"));
          expect(body.title).to.equal("Belajar Spring Boot 3 dari Nol");
          expect(body.blogAttachments).to.be.an("array");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Depends on `create` having run first in this run/session so `blogId` is set.
