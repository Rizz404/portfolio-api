info:
  name: get all - filtered
  type: http
  seq: 3

http:
  method: GET
  url: "{{BASE_URL}}/blogs"
  params:
    - name: search
      value: "Spring Boot"
      type: query
      disabled: false
    - name: sortBy
      value: title
      type: query
      disabled: false
    - name: sortDir
      value: asc
      type: query
      disabled: false
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("results should only contain blogs matching the search keyword", function () {
          const body = res.getBody();
          expect(body.content).to.be.an("array");
          body.content.forEach((blog) => {
            const haystack = `${blog.title} ${blog.content}`.toLowerCase();
            expect(haystack).to.include("spring boot");
          });
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
