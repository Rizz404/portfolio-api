info:
  name: get all - filtered
  type: http
  seq: 3

http:
  method: GET
  url: "{{BASE_URL}}/projects"
  params:
    - name: search
      value: Vue
      type: query
      disabled: false
    - name: status
      value: active
      type: query
      disabled: false
    - name: sortBy
      value: name
      type: query
      disabled: false
    - name: sortDir
      value: asc
      type: query
      disabled: false
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("results should only contain matching, active projects", function () {
          const body = res.getBody();
          expect(body.content).to.be.an("array");
          body.content.forEach((project) => {
            expect(project.status).to.equal("active");
            expect(project.name.toLowerCase()).to.include("vue");
          });
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
