info:
  name: get by id
  type: http
  seq: 5

http:
  method: GET
  url: "{{BASE_URL}}/projects/{{projectId}}"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("response body should match the created project", function () {
          const body = res.getBody();
          expect(body.id).to.equal(bru.getVar("projectId"));
          expect(body.name).to.equal("Vue 3 Portfolio Dashboard");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Depends on `create` having run first in this run/session so `projectId` is set.
