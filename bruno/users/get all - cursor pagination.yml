info:
  name: get all - cursor pagination
  type: http
  seq: 5

http:
  method: GET
  url: "{{BASE_URL}}/users"
  params:
    - name: cursor
      value: "1"
      type: query
      disabled: false
    - name: size
      value: "5"
      type: query
      disabled: false
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("cursor pagination should return a plain array, not a Page object", function () {
          const body = res.getBody();
          expect(body).to.be.an("array");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
