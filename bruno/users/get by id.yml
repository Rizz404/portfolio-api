info:
  name: get by id
  type: http
  seq: 6

http:
  method: GET
  url: "{{BASE_URL}}/users/{{testUserId}}"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("should return 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("response body should match the fixture user", function () {
          const body = res.getBody();
          expect(body.id).to.equal(bru.getVar("testUserId"));
          expect(body.email).to.equal("budi.pratama@example.com");
          expect(body.nickname).to.equal("Budi");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Depends on `setup - register fixture user` having run first in this run/session so
  `testUserId` is set.
